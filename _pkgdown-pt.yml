url: https://bymaxanjos.github.io/LCZ4r/pt
lang: pt

template:
  bootstrap: 5
  bslib:
    bg: "#f8fafc"
    fg: "#1e293b"
    primary: "#10b981"
    secondary: "#3b82f6"
    base_font:
      google: "Inter"
    code_font:
      google: "Fira Code"
  includes:
    in_header: |
      <link rel="stylesheet" href="pkgdown/assets/custom-modern.css">
      <link rel="icon" type="image/png" href="pkgdown/assets/favicon.png">

navbar:
  title: "LCZ4r"
  left:
    - text: "Início"
      href: index.html
    - text: "Tutoriais"
      href: articles/tutorials.html
    - text: "LCZ4r-QGIS Plugin"
      href: articles/examples.html
    - text: "Comunidade"
      menu:
        - text: "GitHub Issues"
          href: https://github.com/ByMaxAnjos/LCZ4r/issues
    - text: "Funções"
      href: reference/index.html
    - text: "Novidades"
      href: news/index.html
  right:
    - icon: fa-robot
      text: "Plataforma LCZ4r"
      href: https://clima-urbano.streamlit.app/
      target: "_blank"
    - icon: fa-github
      href: https://github.com/ByMaxAnjos/LCZ4r/
    - text: "English"
      href: ../en/index.html
    - text: "Español"
      href: ../es/index.html
    - text: "简体中文"
      href: ../zh/index.html

logo:
  src: inst/figures/logo.png
  alt: "logotipo do LCZ4r"

home:
  title: "LCZ4r"
  description: "Pacote em R para análise de Zonas Climáticas Locais (Local Climate Zones) e ilhas de calor urbanas"

reference:
- title: "Funções Gerais"
  desc: >
    Estas funções permitem extrair mapas de LCZ e calcular parâmetros associados para análises espaciais e ambientais.
  contents:
  - lcz_get_map
  - lcz_get_map_euro
  - lcz_get_map_usa
  - lcz_get_map_generator
  - lcz_get_map2
  - lcz_plot_map
  - lcz_cal_area
  - lcz_get_parameters
  - lcz_plot_parameters

- title: "Funções Locais"
  desc: >
    Estas funções dão suporte à modelagem da temperatura do ar, detecção de anomalias e cálculo da intensidade da Ilha de Calor Urbana (ICU).
  contents:
  - lcz_ts
  - lcz_anomaly
  - lcz_interp_map
  - lcz_anomaly_map
  - lcz_plot_interp
  - lcz_interp_eval
  - lcz_uhi_intensity

- title: "Tutoriais e Acesso a Dados LCZ"
  desc: >
    Acesse tutoriais detalhados e conjuntos de dados de exemplo para aprimorar o uso e a aplicação do pacote LCZ4r.
  contents:
  - lcz_tutorial
  - lcz_data

articles:
  - title: "Introduction"
    contents:
      - about
  - title: "Tutorials"
    contents:
      - tutorials
      - Introd_genera_LCZ4r
      - Introd_local_LCZ4r
      - local_func_time_series
      - local_func_anomaly
      - local_func_uhi
      - local_func_modeling
      - local_func_modeling_eval
      - local_func_modeling_crows
      - posit_cloud
  - title: "QGIS Plugin"
    contents:
      - examples
      - Introd_QGIS_LCZ4r
      - instalation_lcz4r_qgis
      - Introd_QGIS_LCZ4r_general

