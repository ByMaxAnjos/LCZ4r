    title: "From Data to Insight"
    text: "LCZ4r simplifies the entire workflow of urban climate analysis. It provides a suite of tools to download, process, visualize, and interpret LCZ and UHI data, making complex spatial analysis accessible to researchers, urban planners, and climate scientists."
