# -----------------------------------------------------------------------
site_meta:
  title: "LCZ4r — Urban Climate Analysis in R"
  author: "Dr. Max Anjos & Team"
  description_en: "The official landing page for the LCZ4r R package, a complete toolkit for Local Climate Zone (LCZ) and Urban Heat Island (UHI) analysis."
  description_pt: "A página oficial do pacote R LCZ4r, um kit de ferramentas completo para análise de Zonas Climáticas Locais (LCZ) e Ilhas de Calor Urbanas (UHI)."
  description_es: "La página oficial del paquete R LCZ4r, un conjunto de herramientas completo para el análisis de Zonas Climáticas Locales (LCZ) e Islas de Calor Urbanas (UHI)."
  theme:
    background: "#f8faf7"
    text_primary: "#1a2e1a"
    text_secondary: "#4a6741"
    glass_card_bg: "rgba(255, 255, 255, 0.70)"
    glass_card_border: "rgba(16, 185, 129, 0.20)"
    thermal_gradient_cold: "#0ea5e9" # Sky Blue
    thermal_gradient_hot:  "#059669" # Forest Green
    accent_glow: "rgba(16, 185, 129, 0.35)" # Green glow for hover

