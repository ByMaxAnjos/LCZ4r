    title: "A Complete Toolkit for Urban Climate Research"
    subtitle: "Explore the key functionalities that make LCZ4r a powerful tool for urban climate studies."
    f1_title: "Global Data Access"
    f1_desc: "Download Local Climate Zone maps from global, European, and USA datasets, or bring your own data from the LCZ Generator."
    f2_title: "Advanced Visualization"
    f2_desc: "Create publication-quality maps of LCZ classifications, thermal anomalies, and interpolated temperature surfaces."
    f3_title: "In-depth Analysis"
    f3_desc: "Calculate LCZ area distributions, analyze time series data, and quantify Urban Heat Island intensity with specialized functions."
